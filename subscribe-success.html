<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dues Paid — DiscGolfRankings</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#1A1A2E" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div style="max-width:480px;width:100%;text-align:center;background:var(--card);border:1px solid var(--divider);border-radius:24px;padding:48px 32px;">
      <div style="width:72px;height:72px;margin:0 auto 24px;border-radius:50%;background:rgba(76,175,80,0.12);display:flex;align-items:center;justify-content:center;">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1 style="font-size:1.75rem;font-weight:900;letter-spacing:-0.02em;margin-bottom:12px;">You're all set 🥏</h1>
      <p style="color:var(--text-secondary);font-size:1rem;line-height:1.6;margin-bottom:8px;">
        Your annual club dues are paid. Your club stays active for another year — rankings, members, and bag tags all keep running.
      </p>
      <p style="color:var(--text-secondary);font-size:0.875rem;line-height:1.6;margin-bottom:28px;">
        Your status updates in the app within a minute. A receipt is on its way from Stripe.
      </p>
      <a href="/" class="btn btn-primary btn-lg" style="justify-content:center;">Back to DiscGolfRankings</a>
      <p style="color:var(--text-secondary);font-size:0.8125rem;margin-top:20px;">
        Questions? <a href="mailto:discgolfrankings@gmail.com" style="color:var(--gold);">discgolfrankings@gmail.com</a>
      </p>
    </div>
  </main>
</body>
</html>
